<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
<style>
  .title { font: bold 34px Arial, sans-serif; fill: #0f172a; }
  .label { font: 20px Arial, sans-serif; fill: #0f172a; }
  .small { font: 16px Arial, sans-serif; fill: #334155; }
  .box { rx: 22; ry: 22; stroke: #334155; stroke-width: 2; }
  .arrow { stroke: #475569; stroke-width: 3; marker-end: url(#arrow); fill: none; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L6,3 z" fill="#475569"/>
  </marker>
</defs>
<rect width="1400" height="900" fill="#f8fafc"/>
<text x="60" y="70" class="title">DocIntel AI Platform — Senior-Level System Architecture</text>

<rect x="70" y="130" width="240" height="110" class="box" fill="#dbeafe"/>
<text x="120" y="170" class="label">Client Apps</text>
<text x="110" y="200" class="small">React dashboard</text>
<text x="110" y="225" class="small">API / Postman / External apps</text>

<rect x="380" y="130" width="250" height="110" class="box" fill="#e9d5ff"/>
<text x="445" y="170" class="label">API Gateway</text>
<text x="430" y="200" class="small">FastAPI + auth-ready routing</text>
<text x="430" y="225" class="small">Upload / Search / Review / Metrics</text>

<rect x="720" y="110" width="580" height="520" class="box" fill="#f1f5f9"/>
<text x="900" y="145" class="label">Intelligence Pipeline</text>

<rect x="760" y="180" width="220" height="100" class="box" fill="#fde68a"/>
<text x="800" y="220" class="label">Ingestion</text>
<text x="785" y="248" class="small">Parsing / OCR-ready normalization</text>

<rect x="1040" y="180" width="220" height="100" class="box" fill="#bfdbfe"/>
<text x="1075" y="220" class="label">Classification</text>
<text x="1067" y="248" class="small">Document type + confidence</text>

<rect x="760" y="330" width="220" height="100" class="box" fill="#fecaca"/>
<text x="805" y="370" class="label">Extraction</text>
<text x="782" y="398" class="small">Fields / entities / summaries</text>

<rect x="1040" y="330" width="220" height="100" class="box" fill="#c7d2fe"/>
<text x="1095" y="370" class="label">Retrieval</text>
<text x="1066" y="398" class="small">Chunking / search / grounded QA</text>

<rect x="900" y="480" width="220" height="100" class="box" fill="#bbf7d0"/>
