<text x="940" y="548" class="small">Risk scoring + task routing</text>

<rect x="120" y="360" width="260" height="120" class="box" fill="#dcfce7"/>
<text x="175" y="402" class="label">Persistence Layer</text>
<text x="150" y="432" class="small">SQL metadata / extracted entities</text>
<text x="150" y="457" class="small">Chunk index / uploaded files</text>

<rect x="120" y="560" width="260" height="120" class="box" fill="#fee2e2"/>
<text x="165" y="602" class="label">MLOps / Platform</text>
<text x="150" y="632" class="small">Docker / K8s / CI / MLflow-ready</text>
<text x="150" y="657" class="small">Metrics / observability / registry-ready</text>

<line x1="310" y1="185" x2="380" y2="185" class="arrow"/>
<line x1="630" y1="185" x2="760" y2="185" class="arrow"/>
<line x1="980" y1="230" x2="1040" y2="230" class="arrow"/>
<line x1="870" y1="280" x2="870" y2="330" class="arrow"/>
<line x1="1150" y1="280" x2="1150" y2="330" class="arrow"/>
<line x1="980" y1="380" x2="1040" y2="380" class="arrow"/>
<line x1="1150" y1="430" x2="1050" y2="480" class="arrow"/>
<line x1="760" y1="380" x2="380" y2="420" class="arrow"/>
<line x1="1040" y1="380" x2="380" y2="420" class="arrow"/>
<line x1="1010" y1="580" x2="380" y2="620" class="arrow"/>

<text x="720" y="710" class="small">Local development runs as a modular monolith; production evolves into independently deployable services.</text>
