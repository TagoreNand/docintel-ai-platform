apiVersion: apps/v1
kind: Deployment
metadata:
  name: docintel-web
  namespace: docintel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docintel-web
  template:
    metadata:
      labels:
        app: docintel-web
    spec:
      containers:
        - name: web
          image: your-registry/docintel-web:latest
          ports:
            - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: docintel-web
  namespace: docintel
spec:
  selector:
    app: docintel-web
  ports:
    - port: 80
      targetPort: 5173
