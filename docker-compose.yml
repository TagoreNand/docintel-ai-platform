version: "3.9"

services:
  api:
    build:
      context: ./services/api_gateway
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg2://docintel:docintel@postgres:5432/docintel
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
      - redis
      - qdrant

  frontend:
    build:
      context: ./frontend/web
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      - api

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: docintel
      POSTGRES_USER: docintel
      POSTGRES_PASSWORD: docintel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.22.1
    command: mlflow server --host 0.0.0.0 --port 5001
    ports:
      - "5001:5001"

volumes:
  postgres_data:
  qdrant_storage:
